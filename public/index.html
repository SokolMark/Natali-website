<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Studio</title>
    <link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<header class="site-header">
    <div class="logo">Visio</div>
    <nav class="main-nav">
        <a href="index.html" class="active">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <section class="stage">
        <div class="layers">
            <svg class="layer" viewBox="0 0 100 100" preserveAspectRatio="none">
                <image href="../src/assets/photo1.jpg" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid slice"></image>
            </svg>
            <svg class="layer" viewBox="0 0 100 100" preserveAspectRatio="none">
                <defs>
                    <mask id="blinds-mask" maskUnits="userSpaceOnUse">
                        <rect x="0" y="0" width="100" height="100" fill="black"></rect>
                        <g id="blinds-group"></g>
                    </mask>
                </defs>
                <image href="../src/assets/photo2.jpg" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid slice" mask="url(#blinds-mask)"></image>
            </svg>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-content">
        <h2>Let's build something beautiful.</h2>
        <div class="contact-info">
            <a href="mailto:contact@visio.com">contact@visio.com</a>
            <span>+38 000 000 00 00</span>
        </div>
    </div>
</footer>

<script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="../src/scripts/index.js"></script>
</body>
</html>
